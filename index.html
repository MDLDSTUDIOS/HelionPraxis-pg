<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helion Praxis - Preguntas</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="grain"></div>
  <div class="glow-field" aria-hidden="true"></div>

  <header class="eyebrow-row">
    <span class="eyebrow">HELION</span>
    <span class="eyebrow-divider">/</span>
    <span class="eyebrow">PRAXIS</span>
  </header>

  <button id="muteBtn" class="mute-btn" title="Silenciar sonido" aria-label="Silenciar sonido">
    <svg id="iconSoundOn" viewBox="0 0 24 24" width="18" height="18"><path d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor"/><path d="M16.5 12a4.5 4.5 0 0 0-2.5-4.03v8.06A4.5 4.5 0 0 0 16.5 12z" fill="currentColor"/><path d="M14 4.35v2.1a7 7 0 0 1 0 11.1v2.1a9 9 0 0 0 0-15.3z" fill="currentColor"/></svg>
    <svg id="iconSoundOff" viewBox="0 0 24 24" width="18" height="18" style="display:none"><path d="M4 9v6h4l5 5V4L8 9H4z" fill="currentColor"/><path d="M19 8l-5 5m0-5l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>

  <main class="stage">

    <div class="altar">
      <span class="bracket bracket-tl"></span>
      <span class="bracket bracket-tr"></span>
      <span class="bracket bracket-bl"></span>
      <span class="bracket bracket-br"></span>

      <canvas id="maskCanvas"></canvas>

      <div id="loadError" class="load-error">
        no se pudo cargar <code>mascaraweb.stl</code> automáticamente<br>
        <span>tu navegador bloquea la carga local por CORS — usa el botón de abajo</span>
      </div>

      <button id="manualLoadBtn" class="manual-load-btn">
        cargar mascaraweb.stl
      </button>
      <input type="file" id="stlFileInput" accept=".stl" hidden>
    </div>

    <p class="prompt-hint" id="promptHint">presiona <kbd>ESPACIO</kbd> para consultar</p>

    <section class="oracle-panel" id="oraclePanel">
      <div class="panel-topline">
        <span class="query-count" id="queryCount">consulta N°00</span>
        <span class="panel-status" id="panelStatus">en reposo</span>
      </div>
      <p class="question-text" id="questionText">la máscara aguarda tu señal…</p>
    </section>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
  <script src="script.js"></script>
</body>
</html>
